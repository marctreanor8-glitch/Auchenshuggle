/* ================= GitHub storage (unchanged access model) ================= */
const CFG_KEY = 'auchenshuggle_gh_cfg';
const POLL_MS = 30000;

function ghHeaders(cfg){ return { 'Authorization':'Bearer '+cfg.token, 'Accept':'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28' }; }
function ghUrl(cfg){ return `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/data.json`; }
function b64encode(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64decode(b64){ return decodeURIComponent(escape(atob(b64.replace(/\s/g,'')))); }

async function ghLoad(cfg){
  const r = await fetch(ghUrl(cfg)+'?t='+Date.now(), { headers: ghHeaders(cfg), cache:'no-store' });
  if (r.status === 404) return { data:null, sha:null, missing:true };
  if (r.status === 401) throw new Error('Token rejected (401). Check the token is correct and not expired.');
  if (r.status === 403) throw new Error('Access denied (403). Check the token has Contents read & write on this repo.');
  if (!r.ok) throw new Error('GitHub error '+r.status);
  const j = await r.json();
  return { data: JSON.parse(b64decode(j.content)), sha: j.sha, missing:false };
}
async function ghSave(cfg, data, sha){
  const body = { message:'Auchenshuggle update '+new Date().toISOString(), content: b64encode(JSON.stringify(data, null, 2)) };
  if (sha) body.sha = sha;
  const r = await fetch(ghUrl(cfg), { method:'PUT', headers:{...ghHeaders(cfg),'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if (r.status === 409 || r.status === 422){ const e = new Error('conflict'); e.conflict = true; throw e; }
  if (r.status === 404) throw new Error('Repo not found (404). Create the private repo first, and scope the token to it.');
  if (!r.ok) throw new Error('Save failed ('+r.status+')');
  const j = await r.json();
  return j.content.sha;
}

/* Accept data written by any earlier version of the app */
function normalize(raw){
  const d = { ...EMPTY, ...(raw || {}) };
  if ((!d.fixedCosts || d.fixedCosts.length === 0) && Array.isArray(raw?.fixedTemplates) && raw.fixedTemplates.length){
    d.fixedCosts = raw.fixedTemplates.map(t => ({
      id: t.id || uid(),
      name: t.desc || t.cat || 'Fixed cost',
      cat: FIXED_CATS.some(c => c.id === t.cat) ? t.cat : 'other_fixed',
      amount: Number(t.amount) || 0,
      paidBy: t.cat === 'car_lease' ? 'p1' : 'split',
      active: t.active !== false,
    }));
  }
  const fo = {};
  Object.entries(d.fixedOverrides || {}).forEach(([m, ovs]) => {
    fo[m] = {};
    Object.entries(ovs || {}).forEach(([id, o]) => {
      fo[m][id] = { ...(o.amount !== undefined ? { amount: Number(o.amount) } : {}), ...((o.skipped || o.skip) ? { skipped:true } : {}) };
    });
  });
  d.fixedOverrides = fo;
  d.expenses = (d.expenses || []).map(e => ({ ...e, date: e.date || ((e.ym || currentYM()) + '-01'), paidBy: e.paidBy || (e.cat === 'car_lease' ? 'p1' : 'split'), amount: Number(e.amount) }));
  d.savings = (d.savings || []).map(s => ({ ...s, date: s.date || ((s.ym || currentYM()) + '-01'), amount: Number(s.amount) }));
  return d;
}

function getSplit(data, month){
  const sal = data.salaries?.[month];
  if (!sal || !sal.p1 || !sal.p2 || (sal.p1 + sal.p2) === 0) return { p1:0.5, p2:0.5, hasSalary:false };
  const t = sal.p1 + sal.p2;
  return { p1: sal.p1/t, p2: sal.p2/t, hasSalary:true };
}
function getWeights(paidBy, split){
  if (paidBy === 'p1') return { p1:1, p2:0 };
  if (paidBy === 'p2') return { p1:0, p2:1 };
  return { p1:split.p1, p2:split.p2 };
}
function getMonthFixedCosts(data, month){
  const templates = data.fixedCosts || [];
  const overrides = (data.fixedOverrides || {})[month] || {};
  return templates.filter(t => t.active !== false).map(t => {
    const ov = overrides[t.id] || {};
    return { ...t, amount: ov.amount !== undefined ? ov.amount : t.amount, skipped: ov.skipped === true };
  });
}
function calcMonthTotals(data, month){
  const split = getSplit(data, month);
  const fixedCosts = getMonthFixedCosts(data, month).filter(f => !f.skipped);
  const varExpenses = (data.expenses || []).filter(e => e.date.startsWith(month));
  let p1Fixed=0, p2Fixed=0, fixedTotal=0;
  fixedCosts.forEach(fc => { const w = getWeights(fc.paidBy, split); p1Fixed += fc.amount*w.p1; p2Fixed += fc.amount*w.p2; fixedTotal += fc.amount; });
  let p1Var=0, p2Var=0, varTotal=0;
  varExpenses.forEach(e => { const w = getWeights(e.paidBy || 'split', split); p1Var += e.amount*w.p1; p2Var += e.amount*w.p2; varTotal += e.amount; });
  return {
    fixedTotal: parseFloat(fixedTotal.toFixed(2)),
    varTotal: parseFloat(varTotal.toFixed(2)),
    total: parseFloat((fixedTotal+varTotal).toFixed(2)),
    p1Share: parseFloat((p1Fixed+p1Var).toFixed(2)),
    p2Share: parseFloat((p2Fixed+p2Var).toFixed(2)),
    split,
  };
}
function calcPot(data){
  const rate = ((data.savingsRate || 3.5)/100)/12;
  const byMonth = {};
  (data.savings || []).forEach(s => { const m = s.date.slice(0,7); byMonth[m] = (byMonth[m]||0) + s.amount; });
  const months = Object.keys(byMonth).sort();
  let running=0, totalInterest=0;
  const monthData = months.map(m => {
    const interest = parseFloat((running*rate).toFixed(2));
    const contrib = byMonth[m] || 0;
    running = parseFloat((running+interest+contrib).toFixed(2));
    totalInterest = parseFloat((totalInterest+interest).toFixed(2));
    return { month:m, contrib, interest, endBalance:running };
  });
  return { total:running, totalInterest, monthData, contributions: parseFloat((running-totalInterest).toFixed(2)) };
}

/* ================= connect screen (unchanged) ================= */
function Setup({ onConnect }){
  const [owner, setOwner] = useState('marctreanor8-glitch');
  const [repo, setRepo] = useState('auchenshuggle-data');
  const [token, setToken] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const connect = async () => {
    setErr(''); setBusy(true);
    const cfg = { owner: owner.trim(), repo: repo.trim(), token: token.trim() };
    try {
      const res = await ghLoad(cfg);
      if (res.missing) await ghSave(cfg, EMPTY, null);
      localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
      onConnect(cfg);
    } catch(e){ setErr(e.message || 'Could not connect.'); }
    finally { setBusy(false); }
  };
  return html`
    <div style=${{padding:'26px 20px',display:'flex',flexDirection:'column',gap:'14px'}}>
      <div style=${{background:C.dark,borderRadius:'14px',padding:'14px 10px 6px'}}><${TramSVG}/></div>
      <h2 style=${{margin:0,color:C.dark,fontFamily:'Georgia,serif'}}>Connect this phone</h2>
      <p style=${{fontSize:'13px',color:C.muted,lineHeight:1.5,margin:0}}>The budget lives in a private GitHub repo. Enter the details once — they're saved on this device only and never appear in the app's source code.</p>
      ${err && html`<div style=${{background:'#FBECEA',border:'1px solid #E8C7C0',color:C.red,borderRadius:'10px',padding:'10px 12px',fontSize:'13px'}}>${err}</div>`}
      <div><${Lbl} text="GitHub username"/><input style=${inp} value=${owner} onInput=${e=>setOwner(e.target.value)} autocapitalize="none" autocorrect="off"/></div>
      <div><${Lbl} text="Data repo name (must be private)"/><input style=${inp} value=${repo} onInput=${e=>setRepo(e.target.value)} autocapitalize="none" autocorrect="off"/></div>
      <div><${Lbl} text="Fine-grained personal access token"/><input style=${inp} type="password" value=${token} onInput=${e=>setToken(e.target.value)} placeholder="github_pat_…" autocapitalize="none" autocorrect="off"/></div>
      <button style=${{...bigBtn,opacity:(busy||!token.trim())?0.5:1}} disabled=${busy || !token.trim()} onClick=${connect}>${busy ? 'Connecting…' : 'Connect'}</button>
      <p style=${{fontSize:'12px',color:C.muted,lineHeight:1.5,margin:0}}>Token setup: GitHub → Settings → Developer settings → Fine-grained tokens. Scope it to the data repo only, with Contents: read and write. Nothing else.</p>
    </div>`;
}

/* ================= main app ================= */
function App(){
  const [cfg, setCfg] = useState(() => { try { return JSON.parse(localStorage.getItem(CFG_KEY)); } catch { return null; } });
  const [data, setData] = useState(EMPTY);
  const [tab, setTab] = useState('expenses');
  const [view, setView] = useState('main');
  const [month, setMonth] = useState(currentYM);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [saveError, setSaveError] = useState(false);
  const [delState, setDelState] = useState(null);
  const [editFixedState, setEditFixedState] = useState(null);
  const [expForm, setExpForm] = useState({ date:today(), desc:'', cat:'groceries', paidBy:'split', amount:'' });
  const [savForm, setSavForm] = useState({ date:today(), amount:'' });
  const [salForm, setSalForm] = useState({ p1:'', p2:'' });
  const [setForm, setSetForm] = useState({ p1:'', p2:'', savingsRate:'', savingsTarget:'' });
  const [fcForm, setFcForm] = useState({ name:'', cat:'mortgage', amount:'', paidBy:'split' });
  const [editFcId, setEditFcId] = useState(null);

  const shaRef = useRef(null);
  const savingRef = useRef(false);

  const load = useCallback(async (silent=false) => {
    if (!cfg) return;
    if (!silent) setSyncing(true);
    try {
      const res = await ghLoad(cfg);
      if (!res.missing && res.sha !== shaRef.current && !savingRef.current){
        shaRef.current = res.sha;
        setData(normalize(res.data));
      }
      setSaveError(false);
    } catch(e){ if (!silent) setSaveError(e.message || 'load failed'); }
    setLoading(false); setSyncing(false);
  }, [cfg]);

  const save = useCallback(async nd => {
    setData(nd);                          /* optimistic UI */
    if (!cfg) return;
    savingRef.current = true;
    setSyncing(true); setSaveError(false);
    try {
      shaRef.current = await ghSave(cfg, nd, shaRef.current);
    } catch(e){
      if (e.conflict){
        try {
          const fresh = await ghLoad(cfg);
          shaRef.current = fresh.sha;
          shaRef.current = await ghSave(cfg, nd, shaRef.current);   /* local wins */
        } catch(e2){ setSaveError(e2.message || 'sync conflict'); }
      } else setSaveError(e.message || 'blocked');
    }
    savingRef.current = false;
    setSyncing(false);
  }, [cfg]);

  useEffect(() => {
    if (!cfg){ setLoading(false); return; }
    load();
    const t = setInterval(() => load(true), POLL_MS);
    const onFocus = () => { if (document.visibilityState === 'visible') load(true); };
    document.addEventListener('visibilitychange', onFocus);
    return () => { clearInterval(t); document.removeEventListener('visibilitychange', onFocus); };
  }, [cfg, load]);

  const disconnect = () => {
    if (!window.confirm('Disconnect this device? Your data stays safe in GitHub.')) return;
    localStorage.removeItem(CFG_KEY);
    shaRef.current = null;
    setCfg(null); setData(EMPTY); setView('main'); setLoading(false);
  };

  if (!cfg) return html`<${Setup} onConnect=${c => { setCfg(c); setLoading(true); }}/>`;

  const split = getSplit(data, month);
  const totals = calcMonthTotals(data, month);
  const fixedForMonth = getMonthFixedCosts(data, month);
  const monthExp = (data.expenses||[]).filter(e => e.date.startsWith(month)).sort((a,b) => b.date.localeCompare(a.date));
  const pot = calcPot(data);
  const monthSavings = (data.savings||[]).filter(s => s.date.startsWith(month));
  const monthSavTotal = monthSavings.reduce((a,s) => a+s.amount, 0);
  const savTarget = data.savingsTarget || 500;
  const p1SavTarget = parseFloat((savTarget*split.p1).toFixed(2));
  const p2SavTarget = parseFloat((savTarget*split.p2).toFixed(2));
  const p1SavShare = parseFloat((monthSavTotal*split.p1).toFixed(2));
  const p2SavShare = parseFloat((monthSavTotal*split.p2).toFixed(2));

  const changeMonth = dir => { const [y,m] = month.split('-').map(Number); const d = new Date(y, m-1+dir, 1); setMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`); };

  const addExpense = async () => {
    if (!expForm.desc.trim() || !expForm.amount) return;
    const exp = { id:uid(), date:expForm.date, desc:expForm.desc.trim(), cat:expForm.cat, paidBy:expForm.paidBy, amount: parseFloat(parseFloat(expForm.amount).toFixed(2)) };
    await save({ ...data, expenses:[exp, ...(data.expenses||[])] });
    setExpForm({ date:today(), desc:'', cat:'groceries', paidBy:'split', amount:'' }); setView('main');
  };
  const addSaving = async () => {
    if (!savForm.amount) return;
    const s = { id:uid(), date:savForm.date, amount: parseFloat(parseFloat(savForm.amount).toFixed(2)) };
    await save({ ...data, savings:[s, ...(data.savings||[])] });
    setSavForm({ date:today(), amount:'' }); setView('main');
  };
  const saveSalary = async () => {
    const ex = data.salaries?.[month] || {};
    const p1v = parseFloat(salForm.p1) || ex.p1 || 0, p2v = parseFloat(salForm.p2) || ex.p2 || 0;
    if (!p1v && !p2v){ setView('main'); return; }
    await save({ ...data, salaries:{ ...(data.salaries||{}), [month]:{ p1:p1v, p2:p2v } } });
    setSalForm({ p1:'', p2:'' }); setView('main');
  };
  const saveSettings = async () => {
    const nd = { ...data };
    if (setForm.p1.trim()) nd.p1 = setForm.p1.trim();
    if (setForm.p2.trim()) nd.p2 = setForm.p2.trim();
    if (setForm.savingsRate) nd.savingsRate = parseFloat(setForm.savingsRate) || 3.5;
    if (setForm.savingsTarget) nd.savingsTarget = parseFloat(setForm.savingsTarget) || 500;
    await save(nd);

  };
  const saveFixedCost = async () => {

    const fc = { id: editFcId || uid(), name: fcForm.name.trim(), cat: fcForm.cat, amount: parseFloat(fcForm.amount), paidBy: fcForm.paidBy, active:true };
    const existing = data.fixedCosts || [];

    setEditFixedState(null);

  const allMonths = [...new Set([...(data.expenses||[]).map(e => e.date.slice(0,7)), ...(data.savings||[]).map(s => s.date.slice(0,7)), ...Object.keys(data.salaries||{})])].sort().reverse();

  const Hdr = ({title, onBack, rightEl}) => html`

        <span style=${{color:C.cream,fontFamily:'Georgia,serif',fontSize:'18px',flex:1}}>${title}</span>
        ${rightEl}
        ${(syncing || saveError) && html`<div style=${{width:'7px',height:'7px',borderRadius:'50%',background:saveError?C.red:C.amber,flexShrink:0}}/>`}
      </div>
      ${saveError && html`<div style=${{background:'#FFF0EE',padding:'6px 16px',fontSize:'11px',color:C.red,fontFamily:'monospace',wordBreak:'break-all'}}>Sync error: ${saveError}</div>`}

  if (loading) return html`

          ${(syncing || saveError) && html`<div style=${{width:'7px',height:'7px',borderRadius:'50%',background:saveError?C.red:C.amber}}/>`}
          <button onClick=${()=>setView('history')} style=${{background:'none',border:'none',color:C.cream,cursor:'pointer',fontSize:'13px',padding:'4px 8px',borderRadius:'8px',fontFamily:'Georgia,serif'}}>History</button>
          <button onClick=${()=>setView('settings')} style=${{background:'none',border:'none',color:C.cream,cursor:'pointer',fontSize:'20px',padding:0}}>⚙</button>
        </div>
      </div>
      <div style=${{background:C.dark,padding:'0 16px 16px'}}><${TramSVG}/></div>
      ${saveError && html`<div style=${{background:'#FFF0EE',borderBottom:'1px solid #F5C6C0',padding:'8px 16px',fontSize:'12px',color:C.red,fontFamily:'monospace',wordBreak:'break-all'}}>Sync error: ${saveError}</div>`}
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 20px 0'}}>
        <button onClick=${()=>changeMonth(-1)} style=${{background:'none',border:'none',fontSize:'22px',cursor:'pointer',color:C.mid,padding:0}}>‹</button>
        <div style=${{textAlign:'center'}}>
          <div style=${{fontSize:'16px',fontWeight:700,color:C.text}}>${monthLabel(month)}</div>
          ${!split.hasSalary
            ? html`<button onClick=${()=>{setSalForm({p1:'',p2:''});setView('salary');}} style=${{background:'none',border:'none',color:C.amber,fontSize:'11px',cursor:'pointer',padding:0,marginTop:'2px',textDecoration:'underline',fontFamily:'Georgia,serif'}}>Set salaries for this month</button>`
            : html`<div style=${{fontSize:'11px',color:C.muted,marginTop:'2px'}}>Split: ${(split.p1*100).toFixed(1)}% / ${(split.p2*100).toFixed(1)}%
                <button onClick=${()=>{setSalForm({p1:'',p2:''});setView('salary');}} style=${{background:'none',border:'none',color:C.amber,fontSize:'11px',cursor:'pointer',padding:'0 0 0 6px',textDecoration:'underline',fontFamily:'Georgia,serif'}}>edit</button>
              </div>`}
        </div>
        <button onClick=${()=>changeMonth(1)} style=${{background:'none',border:'none',fontSize:'22px',cursor:'pointer',color:C.mid,padding:0}}>›</button>
      </div>

      ${tab === 'expenses' && html`
        <div style=${{padding:'14px 16px'}}>
          <div style=${{background:C.mid,borderRadius:'16px',padding:'18px 20px',marginBottom:'14px',color:'white'}}>
            <div style=${{fontSize:'11px',opacity:0.7,letterSpacing:'1px',textTransform:'uppercase',marginBottom:'10px',textAlign:'center'}}>Total — ${monthLabel(month)}</div>
            <div style=${{textAlign:'center',fontSize:'32px',fontWeight:700,fontFamily:"'Courier New',monospace",marginBottom:'14px'}}>${fmt(totals.total)}</div>
            <div style=${{display:'flex',gap:'8px',marginBottom:totals.total>0?'12px':0,fontSize:'12px'}}>
              <div style=${{flex:1,background:'rgba(255,255,255,0.1)',borderRadius:'8px',padding:'9px',textAlign:'center'}}>
                <div style=${{opacity:0.75,marginBottom:'3px'}}>Fixed</div>
                <div style=${{fontFamily:"'Courier New',monospace",fontWeight:700,fontSize:'14px'}}>${fmt(totals.fixedTotal)}</div>
              </div>
              <div style=${{flex:1,background:'rgba(255,255,255,0.1)',borderRadius:'8px',padding:'9px',textAlign:'center'}}>
                <div style=${{opacity:0.75,marginBottom:'3px'}}>Variable</div>
                <div style=${{fontFamily:"'Courier New',monospace",fontWeight:700,fontSize:'14px'}}>${fmt(totals.varTotal)}</div>
              </div>
            </div>
            ${totals.total > 0 && html`<div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
              ${[{name:data.p1,share:totals.p1Share},{name:data.p2,share:totals.p2Share}].map(p => html`
                <div key=${p.name} style=${{background:'rgba(255,255,255,0.12)',borderRadius:'10px',padding:'12px',textAlign:'center'}}>
                  <div style=${{fontSize:'11px',opacity:0.8,marginBottom:'4px'}}>${p.name} pays</div>
                  <div style=${{fontSize:'20px',fontWeight:700,fontFamily:"'Courier New',monospace"}}>${fmt(p.share)}</div>
                </div>`)}
            </div>`}
          </div>

          <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'7px'}}>
            <${Lbl} text=${`Fixed costs${fixedForMonth.length>0?` (${fixedForMonth.length})`:''}`}/>
            <button onClick=${()=>setView('manageFixed')} style=${{background:'none',border:'none',color:C.amber,fontSize:'12px',cursor:'pointer',padding:0,textDecoration:'underline',fontFamily:'Georgia,serif'}}>Manage</button>
          </div>
          ${fixedForMonth.length === 0
            ? html`<div style=${{background:C.card,borderRadius:'14px',padding:'18px',border:`1px solid ${C.border}`,marginBottom:'14px',textAlign:'center'}}>
                <div style=${{fontSize:'13px',color:C.muted,marginBottom:'10px'}}>No fixed costs set up yet</div>
                <button onClick=${()=>setView('manageFixed')} style=${{background:C.dark,color:'#fff',border:'none',borderRadius:'10px',padding:'10px 20px',fontSize:'13px',cursor:'pointer',fontFamily:'Georgia,serif'}}>Set up fixed costs →</button>
              </div>`
            : html`<div style=${{background:C.card,borderRadius:'14px',overflow:'hidden',border:`1px solid ${C.border}`,marginBottom:'14px'}}>
                ${fixedForMonth.map((fc,i) => html`
                  <${FixedCostRow} key=${fc.id} fc=${fc} split=${split} p1Name=${data.p1} p2Name=${data.p2}
                    showBorder=${i>0} onEdit=${()=>setEditFixedState({fc, month})}/>`)}
              </div>`}

          <${Lbl} text="Variable expenses"/>
          ${monthExp.length === 0
            ? html`<div style=${{textAlign:'center',padding:'32px 20px',color:C.muted}}>
                <div style=${{fontSize:'32px',marginBottom:'8px'}}>🧾</div>
                <div style=${{fontSize:'15px',color:C.text,marginBottom:'4px'}}>No variable expenses yet</div>
                <div style=${{fontSize:'13px'}}>Tap + to add groceries, meals, petrol etc.</div>
              </div>`
            : html`<div style=${{background:C.card,borderRadius:'14px',overflow:'hidden',border:`1px solid ${C.border}`}}>
                ${monthExp.map((e,i) => html`<${VarExpenseRow} key=${e.id} e=${e} showBorder=${i>0} onDelete=${()=>setDelState({type:'expense',id:e.id})}/>`)}
              </div>`}
        </div>`}

      ${tab === 'savings' && html`
        <div style=${{padding:'14px 16px'}}>
          <div style=${{background:C.mid,borderRadius:'16px',padding:'20px',marginBottom:'14px',color:'white',textAlign:'center'}}>
            <div style=${{fontSize:'12px',opacity:0.8,letterSpacing:'1px',textTransform:'uppercase',marginBottom:'6px'}}>Total Pot</div>
            <div style=${{fontSize:'36px',fontWeight:700,fontFamily:"'Courier New',monospace",marginBottom:'4px'}}>${fmt(pot.total)}</div>
            <div style=${{fontSize:'12px',opacity:0.75}}>Contributions ${fmt(pot.contributions)} + Interest ${fmt(pot.totalInterest)}</div>
            <div style=${{fontSize:'11px',opacity:0.6,marginTop:'2px'}}>Rate: ${data.savingsRate||3.5}% AER</div>
          </div>

          <div style=${{background:C.card,borderRadius:'14px',padding:'14px 16px',marginBottom:'14px',border:`1px solid ${C.border}`}}>
            <${Lbl} text=${`${monthLabel(month)} — target £${savTarget}`}/>
            <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
              ${[{k:'p1',share:p1SavShare,target:p1SavTarget},{k:'p2',share:p2SavShare,target:p2SavTarget}].map(({k,share,target}) => {
                const pct = target > 0 ? Math.min(share/target, 1) : 0;
                return html`
                  <div key=${k}>
                    <div style=${{fontSize:'12px',color:C.muted,marginBottom:'6px'}}>${data[k]}</div>
                    <div style=${{height:'6px',borderRadius:'4px',background:C.border,marginBottom:'4px',overflow:'hidden'}}>
                      <div style=${{height:'100%',width:(pct*100)+'%',background:pct>=1?C.light:C.amber,borderRadius:'4px',transition:'width 0.4s'}}/>
                    </div>
                    <div style=${{fontSize:'12px',fontFamily:"'Courier New',monospace"}}>${fmt(share)} <span style=${{color:C.muted}}>/ ${fmt(target)}</span></div>
                  </div>`;
              })}
            </div>
            ${monthSavTotal > 0 && html`<div style=${{marginTop:'10px',paddingTop:'10px',borderTop:`1px solid ${C.border}`,fontSize:'12px',color:C.muted,textAlign:'center'}}>Total saved this month: <strong style=${{color:C.text}}>${fmt(monthSavTotal)}</strong></div>`}
          </div>

          ${pot.monthData.length > 0 && html`<div style=${{background:C.goldBg,borderRadius:'14px',padding:'14px 16px',marginBottom:'14px',border:'1px solid #E8DCB8'}}>
            <${Lbl} text="Recent interest earned"/>
            ${pot.monthData.slice(-3).reverse().map(md => html`
              <div key=${md.month} style=${{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:`1px solid ${C.border}`,fontSize:'13px'}}>
                <span style=${{color:C.muted}}>${monthLabel(md.month)}</span>
                <span style=${{color:C.gold,fontFamily:"'Courier New',monospace"}}>+${fmt(md.interest)}</span>
                <span style=${{color:C.text,fontFamily:"'Courier New',monospace"}}>${fmt(md.endBalance)}</span>
              </div>`)}
          </div>`}

          <${Lbl} text="This month's contributions"/>
          ${monthSavings.length === 0
            ? html`<div style=${{textAlign:'center',padding:'44px 20px',color:C.muted}}>
                <div style=${{fontSize:'36px',marginBottom:'10px'}}>💰</div>
                <div style=${{fontFamily:'Georgia,serif',fontSize:'17px',color:C.text,marginBottom:'4px'}}>No contributions yet</div>
                <div style=${{fontSize:'13px'}}>Tap + to log one</div>
              </div>`
            : html`<div style=${{background:C.card,borderRadius:'14px',overflow:'hidden',border:`1px solid ${C.border}`}}>
                ${monthSavings.map((s,i) => html`<${SavingRow} key=${s.id} s=${s} showBorder=${i>0} onDelete=${()=>setDelState({type:'saving',id:s.id})}/>`)}
              </div>`}
        </div>`}

      <button onClick=${()=>tab==='expenses'?setView('add'):setView('addSaving')}
        style=${{position:'fixed',bottom:'76px',right:'22px',width:'62px',height:'62px',borderRadius:'31px',background:C.amber,border:'none',color:'white',fontSize:'32px',cursor:'pointer',boxShadow:'0 4px 22px rgba(0,0,0,0.28)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,lineHeight:1}}>+</button>

      <${BottomNav} tab=${tab} setTab=${setTab}/>
      ${delState && html`<${DelModal} onConfirm=${delEntry} onCancel=${()=>setDelState(null)}/>`}
      ${editFixedState && html`
        <${EditFixedModal}
          fc=${editFixedState.fc}
          month=${editFixedState.month}
          override=${((data.fixedOverrides||{})[editFixedState.month]||{})[editFixedState.fc.id]}
          onSave=${ov => saveFixedOverride(editFixedState.fc.id, ov)}
          onCancel=${()=>setEditFixedState(null)}
        />`}
    </div>`;
}

render(html`<${App}/>`, document.getElementById('root'));
</script>
</body>
</html>
